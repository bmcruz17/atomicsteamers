<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;box-sizing:border-box}
body{width:1080px;height:1920px;overflow:hidden}
.ad{position:relative;width:1080px;height:1920px;overflow:hidden;font-family:'Poppins',sans-serif;color:#fff}
.bg{position:absolute;inset:0;background:url('/images/steam-action.jpg') center/cover}
.ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,30,22,.5) 0%,rgba(6,30,22,.12) 28%,rgba(4,26,18,.96) 100%)}
.logo{position:absolute;top:50px;left:58px;display:flex;align-items:center;gap:16px;font-weight:800;font-size:42px;z-index:2}
.logo .mark{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#15b07e,#0b6e4f);display:grid;place-items:center;font-size:36px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.logo .accent{color:#9be9cd}
.stars{position:absolute;top:64px;right:58px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.32);border-radius:999px;padding:12px 22px;font-weight:700;font-size:28px;z-index:2}
.stars b{color:#f4a72c}
.content{position:absolute;left:58px;right:58px;bottom:70px;z-index:2}
.eyebrow{color:#f4a72c;font-weight:700;letter-spacing:.12em;font-size:30px;text-transform:uppercase;margin-bottom:20px}
h1{font-weight:800;font-size:128px;line-height:1.0;letter-spacing:-1px;margin-bottom:26px;text-shadow:0 4px 26px rgba(0,0,0,.45)}
h1 .hl{color:#f4a72c}
.sub{font-size:40px;font-weight:500;color:#eafaf3;line-height:1.25;margin-bottom:38px;max-width:94%;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.cta{display:inline-flex;align-items:center;gap:14px;background:#f4a72c;color:#3a2a06;font-weight:800;font-size:38px;padding:24px 44px;border-radius:999px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
</style></head><body>
<div class="ad">
  <div class="bg"></div><div class="ov"></div>
  <div class="logo"><span class="mark">⚛︎</span>Atomic<span class="accent">Steamers</span></div>
  <div class="stars">★★★★★ <b>5.0</b> Google</div>
  <div class="content">
    <div class="eyebrow">Oahu · Chemical-Free</div>
    <h1>Bed Bugs?<br><span class="hl">Gone.</span></h1>
    <div class="sub">352°F pure steam kills bed bugs &amp; their eggs on contact. Safe for keiki &amp; pets. Keep your furniture.</div>
    <div class="cta">📞 Free Inspection · (808) 470-2500</div>
  </div>
</div></body></html>
