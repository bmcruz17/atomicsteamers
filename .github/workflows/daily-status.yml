name: Daily status refresh

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC = 1:00am HST (Hawaii, UTC-10)
  workflow_dispatch:        # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Refresh STATUS.md
        run: bash scripts/update-status.sh

      - name: Commit daily (always, to keep the repo + schedule active)
        run: |
          git config user.name "atomic-steamers-bot"
          git config user.email "actions@github.com"
          git add STATUS.md
          git commit --allow-empty -m "chore: daily STATUS.md refresh ($(date -u +%Y-%m-%d))"
          git push origin main
